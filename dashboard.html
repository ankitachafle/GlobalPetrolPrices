<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <h2 class="logo-text">Aether<span class="neon-text">Predict</span></h2>
        <button onclick="logout()" class="btn-secondary">Logout</button>
    </nav>
    
    <div class="split-container">
        <!-- Left Panel for info/visuals -->
        <div class="left-panel">
            <div class="glass-card left-info-card">
                <h2>Configure Parameters</h2>
                <p>Input economic indices and current prices to process the global petrol price prediction model.</p>
                <div class="glow-orb"></div>
            </div>
        </div>

        <!-- Right Panel for Form -->
        <div class="right-panel">
            <div class="glass-form">
                <h3>Prediction Model Inputs</h3>
                <form id="prediction-form" onsubmit="handlePredict(event)">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Country</label>
                            <input type="text" id="Country" required value="USA">
                        </div>
                        <div class="input-group">
                            <label>ISO Code</label>
                            <input type="text" id="ISO" required value="US">
                        </div>
                        <div class="input-group">
                            <label>Region</label>
                            <input type="text" id="Region" required value="North America">
                        </div>
                        <div class="input-group">
                            <label>Currency</label>
                            <input type="text" id="Currency" required value="USD">
                        </div>
                        <div class="input-group">
                            <label>Before War Price</label>
                            <input type="number" step="0.01" id="Before_War_Price" required value="3.50">
                        </div>
                        <div class="input-group">
                            <label>Unit (e.g., Gallon, Litre)</label>
                            <input type="text" id="Unit" required value="Gallon">
                        </div>
                        <div class="input-group">
                            <label>Trend</label>
                            <input type="text" id="Trend" required value="Up">
                        </div>
                        <div class="input-group">
                            <label>Before War USD</label>
                            <input type="number" step="0.01" id="Before_War_USD" required value="3.50">
                        </div>
                        <div class="input-group">
                            <label>Mar 7 USD Price</label>
                            <input type="number" step="0.01" id="Mar7_USD" required value="4.20">
                        </div>
                        <div class="input-group">
                            <label>Oil Import Dependency</label>
                            <select id="Oil_Import_Dep" required>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary mt-4" id="predict-btn">Generate Prediction</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
